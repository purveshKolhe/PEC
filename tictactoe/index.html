<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic Tac Toe</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1 class="header">Tic Tac Toe</h1>
    
    <div class="cont">
        <div class="row1">
            <div class="cell1 cell" onclick="tick1()"></div>
            <div class="cell2 cell" onclick="tick2()"></div>
            <div class="cell3 cell" onclick="tick3()"></div>
        </div>
        <div class="row2">
            <div class="cell4 cell" onclick="tick4()"></div>
            <div class="cell5 cell" onclick="tick5()"></div>
            <div class="cell6 cell" onclick="tick6()"></div>
        </div>
        <div class="row3">
            <div class="cell7 cell" onclick="tick7()"></div>
            <div class="cell8 cell" onclick="tick8()"></div>
            <div class="cell9 cell" onclick="tick9()"></div>
        </div>
    </div>
    <script src="main.js"></script>
</body>
</html>
